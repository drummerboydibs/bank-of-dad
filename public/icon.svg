<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" fill="#15803d" />
  <!-- coin dropping in -->
  <circle cx="256" cy="120" r="34" fill="#fde047" stroke="#ffffff" stroke-width="6" />
  <text x="256" y="133" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#15803d" text-anchor="middle">$</text>
  <!-- piggy bank body -->
  <g fill="#ffffff">
    <ellipse cx="248" cy="300" rx="158" ry="118" />
    <!-- snout -->
    <ellipse cx="392" cy="300" rx="40" ry="46" />
    <!-- ear -->
    <path d="M150 196 q26 -36 64 -22 q-20 28 -64 22 Z" />
    <!-- legs -->
    <rect x="150" y="392" width="34" height="44" rx="10" />
    <rect x="300" y="392" width="34" height="44" rx="10" />
  </g>
  <!-- coin slot -->
  <rect x="214" y="196" width="86" height="16" rx="8" fill="#15803d" />
  <!-- snout nostrils -->
  <circle cx="386" cy="292" r="7" fill="#15803d" />
  <circle cx="404" cy="292" r="7" fill="#15803d" />
  <!-- eye -->
  <circle cx="300" cy="262" r="11" fill="#15803d" />
</svg>
